<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trail Snacks — Wanderlog</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
:root {
  --green: #586048;
  --green-deep: #3f4634;
  --tan: #d1af82;
  --tan-deep: #b88a4a;
  --offwhite: #F7F7EF;
  --offwhite-2: #efece1;
  --yellow: #FFC806;
  --blue: #ddeaf1;
  --ink: #222222;
  --rule: rgba(88, 96, 72, 0.18);
  --rule-strong: rgba(88, 96, 72, 0.4);
  --shadow-soft: 0 6px 22px rgba(58, 50, 30, 0.10);
  --shadow-card: 0 18px 48px rgba(58, 50, 30, 0.18);
  --serif: 'Nunito', 'Helvetica Neue', sans-serif;
  --display: 'Syne', 'Helvetica Neue', sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--serif);
  background: var(--offwhite);
  color: var(--green-deep);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ───────────────────────── HEADER ───────────────────────── */
.sn-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 36px 18px;
  background: var(--offwhite);
  border-bottom: 1px solid var(--rule);
  position: sticky;
  top: 0;
  z-index: 100;
}
.sn-brand-title {
  font-family: var(--display);
  font-weight: 800;
  font-size: 1.6rem;
  letter-spacing: 2px;
  color: var(--green);
  text-transform: uppercase;
  line-height: 1;
}
.sn-brand-sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: 0.88rem;
  color: var(--tan-deep);
  margin-top: 4px;
}
.sn-nav-link {
  font-family: var(--serif);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--green);
  background: var(--offwhite);
  border: 1.5px solid var(--rule-strong);
  border-radius: 999px;
  padding: 8px 20px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
  letter-spacing: 0.3px;
}
.sn-nav-link:hover { background: var(--green); color: var(--offwhite); }

/* ───────────────────────── GALLERY ───────────────────────── */
.sn-page { padding: 40px 36px 80px; }
.sn-page-title {
  font-family: var(--display);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--tan-deep);
  margin-bottom: 28px;
}
.sn-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 28px;
}

/* ───────────────────────── CARD ───────────────────────── */
.sn-card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-soft);
  transition: box-shadow 0.2s, transform 0.2s;
}
.sn-card:hover {
  box-shadow: var(--shadow-card);
  transform: translateY(-3px);
}
.sn-card-photo {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  display: block;
  background: var(--tan);
}
.sn-card-body { padding: 16px 18px 18px; }
.sn-card-name {
  font-family: var(--display);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--green);
  line-height: 1.2;
}
.sn-card-country {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--tan-deep);
  margin-top: 4px;
}
.sn-card-scores { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
.sn-score-row { display: flex; align-items: flex-start; gap: 10px; }
.sn-score-badge {
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 700;
  min-width: 42px;
  text-align: center;
  padding: 3px 6px;
  border-radius: 6px;
  background: var(--offwhite-2);
  color: var(--green);
  flex-shrink: 0;
  border: 1px solid var(--rule);
}
.sn-score-who {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--tan-deep);
  flex-shrink: 0;
  padding-top: 4px;
  min-width: 34px;
}
.sn-score-note {
  font-family: var(--serif);
  font-style: italic;
  font-size: 0.82rem;
  color: var(--green-deep);
  line-height: 1.35;
}
.sn-card-avg {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sn-avg-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--tan-deep);
}
.sn-avg-score {
  font-family: var(--display);
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--green);
}

/* ───────────────────────── LOADING / ERROR ───────────────────────── */
.sn-loading {
  text-align: center;
  padding: 80px 0;
  font-family: var(--serif);
  font-style: italic;
  color: var(--tan-deep);
}
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="snacks.jsx"></script>
</body>
</html>
